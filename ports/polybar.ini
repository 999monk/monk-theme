; monk-theme — polybar theme
; https://github.com/yourusername/monk-theme

[colors]
bg         = #181616
fg         = #c5c9c5
bg-panel   = #1e1c1c
bg-module  = #2e2c2c
bg-alt     = #3a3838
border     = #4a4847
dim        = #5c5a59
muted      = #716f6e
subtle     = #888785
mid        = #9e9d9a
fg-soft    = #b4b3af
fg-main    = #c5c9c5
fg-bright  = #dcdedd
fg-cursor  = #f0f2f0
bg-trans   = #CC181616
bg-bar     = #EE1e1c1c

[bar/main]
width            = 100%
height           = 28
background       = ${colors.bg-bar}
foreground       = ${colors.fg}
border-bottom-size  = 1
border-bottom-color = ${colors.border}
padding-left     = 2
padding-right    = 2
module-margin    = 1
font-0           = monospace:size=10;2
modules-left     = i3
modules-center   = date
modules-right    = cpu memory
separator        = |
separator-foreground = ${colors.border}

[module/date]
type             = internal/date
date             = %a %d %b
time             = %H:%M
label            = %date%  %time%
label-foreground = ${colors.fg-main}

[module/cpu]
type                  = internal/cpu
interval              = 2
format-prefix         = "cpu "
format-prefix-foreground = ${colors.muted}
label                 = %percentage%%
label-foreground      = ${colors.fg-soft}

[module/memory]
type                  = internal/memory
interval              = 3
format-prefix         = "mem "
format-prefix-foreground = ${colors.muted}
label                 = %percentage_used%%
label-foreground      = ${colors.fg-soft}

[module/i3]
type                       = internal/i3
label-focused              = %name%
label-focused-foreground   = ${colors.fg-bright}
label-focused-background   = ${colors.bg-module}
label-focused-padding      = 2
label-unfocused            = %name%
label-unfocused-foreground = ${colors.dim}
label-unfocused-padding    = 2
label-urgent               = %name%
label-urgent-foreground    = ${colors.fg-cursor}
label-urgent-background    = ${colors.bg-alt}
label-urgent-padding       = 2
